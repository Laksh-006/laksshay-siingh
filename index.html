<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laksshay Singh | Inspirational Speaker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
    color:white;
}

/* Animated Gradient Background */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #000428);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    z-index:-2;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Particle Canvas */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* Content */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

h1{
    font-size:60px;
    font-weight:800;
    background: linear-gradient(90deg,#00f5a0,#00d9f5);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:10px;
}

.tagline{
    font-size:22px;
    font-weight:300;
    margin:15px 0 25px;
    opacity:0.9;
}

.bio{
    max-width:700px;
    font-size:18px;
    opacity:0.85;
    margin-bottom:40px;
    line-height:1.6;
}

.buttons{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    padding:14px 30px;
    border-radius:50px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s ease;
}

.email{
    background:#00f5a0;
    color:#000;
}

.whatsapp{
    background:#25D366;
    color:#000;
}

.btn:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 35px rgba(0,0,0,0.5);
}

footer{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    opacity:0.6;
}

/* Responsive */
@media(max-width:768px){
    h1{
        font-size:40px;
    }
    .tagline{
        font-size:18px;
    }
}
</style>
</head>

<body>

<div class="background"></div>
<canvas id="particles"></canvas>

<div class="container">
    <h1>Laksshay Singh</h1>
    <div class="tagline">The Most Inspirational Speaker</div>

    <div class="bio">
        Empowering minds. Igniting ambition. Transforming lives.
        Laksshay Singh helps individuals unlock unstoppable confidence
        and rise beyond limitations.
    </div>

    <div class="buttons">
        <a class="btn email" href="mailto:yourmail@gmail.com">📧 Connect via Email</a>
        <a class="btn whatsapp" href="https://wa.me/911234567890">💬 Connect on WhatsApp</a>
    </div>
</div>

<footer>
    © 2026 Laksshay Singh | All Rights Reserved
</footer>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle{
    constructor(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.size = Math.random()*2 + 1;
        this.speedX = Math.random()*0.5 - 0.25;
        this.speedY = Math.random()*0.5 - 0.25;
    }
    update(){
        this.x += this.speedX;
        this.y += this.speedY;

        if(this.x > canvas.width) this.x = 0;
        if(this.x < 0) this.x = canvas.width;
        if(this.y > canvas.height) this.y = 0;
        if(this.y < 0) this.y = canvas.height;
    }
    draw(){
        ctx.fillStyle = "rgba(0,245,160,0.8)";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

function init(){
    particlesArray = [];
    for(let i=0;i<120;i++){
        particlesArray.push(new Particle());
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=0;i<particlesArray.length;i++){
        particlesArray[i].update();
        particlesArray[i].draw();
    }
    requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    init();
});
</script>

</body>
</html>
